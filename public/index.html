<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DOM Events</title>
</head>

<body>

<h1>My Page</h1>

<input type="button" value="alert" onclick="alertFun()"/>
<input type="button" value="confirm" onclick="confirmFun()"/>
<input type="button" value="prompt" onclick="promptFun()"/>

<span id="result"></span>

<img id="cageImg" src="https://www.placecage.com/200/200" alt="Nicolas Cage">

<script>

function alertFun(){
  alert("Hello !");
}

function confirmFun(){
  let didConfirm = confirm("Are you sure about that?");
  if(didConfirm){
    alert("You confirmed :)");
  }else{
    alert("You did not confirm :(");
  }
}

function promptFun(){
  let val = prompt("What is your name?");
  alert(`You've entered: ${val}`);
}

function loaded(){
  console.log("img loaded");
}

let cageImg = document.querySelector("#cageImg");
cageImg.addEventListener("load", loaded);

</script>

</body>
</html>
